<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns='http://www.w3.org/2000/svg' width='900' height='678' viewBox='0 0 900 678'>
  <defs>
    <style>
      .bg { fill: #f4f1e8; }
      .frame { fill: #fffdf8; stroke: #1f2937; stroke-width: 2; rx: 14; }
      .txt { font-family: "Cascadia Mono", "Consolas", monospace; font-size: 16px; fill: #111827; white-space: pre; }
      .title { font-family: "Malgun Gothic", sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
    </style>
  </defs>
  <rect class='bg' x='0' y='0' width='900' height='678' />
  <rect class='frame' x='8' y='8' width='884' height='662' />
  <text class='title' x='18' y='26'>Section 4.2</text>
  <text class='txt' x='18' y='54'>+------------------------------------------------------------------------------------------------+</text>
  <text class='txt' x='18' y='78'>| Logo | 콘텐츠 생성 워크스페이스                                      상태: 대기                  |</text>
  <text class='txt' x='18' y='102'>|------------------------------------------------------------------------------------------------|</text>
  <text class='txt' x='18' y='126'>| [좌측: 입력]                                      | [우측: 생성 옵션]                          |</text>
  <text class='txt' x='18' y='150'>|------------------------------------------------------------------------------------------------|</text>
  <text class='txt' x='18' y='174'>| 입력 방식: (o) 수기 입력  ( ) CSV 업로드          | 생성 채널*                                  |</text>
  <text class='txt' x='18' y='198'>|------------------------------------------------------------------------------------------------|</text>
  <text class='txt' x='18' y='222'>| 상품명*          [____________________________]    | [x] 블로그  [x] 인스타그램  [x] 페이스북   |</text>
  <text class='txt' x='18' y='246'>| 카테고리*        [____________________________]    |                                              |</text>
  <text class='txt' x='18' y='270'>| 주요 특징*       [+ 특징 추가]                    | 톤앤매너* [전문적 v]                        |</text>
  <text class='txt' x='18' y='294'>| 타겟 고객*       [____________________________]    | 길이      [표준 v]                           |</text>
  <text class='txt' x='18' y='318'>| (선택) 가격대    [____________________________]    | 목적      [전환 v]                           |</text>
  <text class='txt' x='18' y='342'>|------------------------------------------------------------------------------------------------|</text>
  <text class='txt' x='18' y='366'>| 팀 가이드(공통 프롬프트)                           | [생성하기] [선택 항목 재생성] [전체 초기화] |</text>
  <text class='txt' x='18' y='390'>| 기본 톤         [친근하면서도 프로페셔널________]   |                                              |</text>
  <text class='txt' x='18' y='414'>| 핵심 메시지      [고품질/합리적 가격/빠른 배송___]   | 예상 생성 시간: 약 5~10초                    |</text>
  <text class='txt' x='18' y='438'>| 금지 표현        [____________________________]    | 실패 항목: 0건                               |</text>
  <text class='txt' x='18' y='462'>| 필수 표현        [____________________________]    |                                              |</text>
  <text class='txt' x='18' y='486'>|------------------------------------------------------------------------------------------------|</text>
  <text class='txt' x='18' y='510'>| CSV 업로드 패널(토글)                                                                      |</text>
  <text class='txt' x='18' y='534'>| [파일 선택] sample_products.csv   [업로드] [템플릿 다운로드]                               |</text>
  <text class='txt' x='18' y='558'>| 매핑: 상품명/카테고리/주요특징/타겟고객                                                   |</text>
  <text class='txt' x='18' y='582'>| 미리보기: 총 200건 중 유효 196건, 오류 4건 [오류 행 보기]                                  |</text>
  <text class='txt' x='18' y='606'>+------------------------------------------------------------------------------------------------+</text>
</svg>
